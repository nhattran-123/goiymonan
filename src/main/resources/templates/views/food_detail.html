<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết món ăn - Healthy Food</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="/assets/css/home.css">
    <link rel="stylesheet" href="/assets/css/food_detail.css">
</head>
<body>

    <aside class="sidebar">
        <div class="brand">
            <div class="brand-icon"><i class="fa-solid fa-leaf text-white"></i></div>
            <div class="brand-text">
                <h2>Healthy Food</h2>
                <span>Dinh dưỡng thông minh</span>
            </div>
        </div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="/home" class="nav-link"><i class="fa-solid fa-house"></i> Trang chủ</a></li>
            <li class="nav-item"><a href="/profile" class="nav-link"><i class="fa-regular fa-user"></i> Hồ sơ sức khỏe</a></li>
            <li class="nav-item"><a href="/foods" class="nav-link active"><i class="fa-solid fa-utensils"></i> Món ăn</a></li>
            <li class="nav-item"><a href="/meal_plan" class="nav-link"><i class="fa-regular fa-calendar-days"></i> Thực đơn</a></li>
            <li class="nav-item"><a href="/progress" class="nav-link"><i class="fa-solid fa-chart-line"></i> Tiến trình</a></li>
            <li class="nav-item"><a href="/favorites" class="nav-link"><i class="fa-regular fa-heart"></i> Yêu thích</a></li>
            <li class="nav-item"><a href="/search" class="nav-link"><i class="fa-solid fa-magnifying-glass"></i> Tìm kiếm</a></li>
            <li class="nav-item"><a href="/settings" class="nav-link"><i class="fa-solid fa-gear"></i> Cài đặt</a></li>
        </ul>
        <div class="logout-box">
            <a href="/logout" class="nav-link"><i class="fa-solid fa-arrow-right-from-bracket"></i> Đăng xuất</a>
        </div>
    </aside>

    <main class="main-content">
        <a href="/foods" style="color: #666; text-decoration: none; margin-bottom: 20px; display: inline-block; font-weight: 500;">
            <i class="fa-solid fa-chevron-left"></i> Quay lại danh sách
        </a>
        
        <img id="foodHeroImage" class="hero-image" src="" onerror="this.src='https://via.placeholder.com/900x380?text=Food+Image'">
        
        <div class="action-bar">
            <div class="action-item">
                <button id="btnToggleFavorite" class="btn btn-like">
                    <i class="fa-regular fa-heart"></i>
                    <span id="favText">Thêm yêu thích</span>
                </button>
            </div>
            <a class="btn btn-add action-item"   href="/meal_plan">
                <i class="fa-solid fa-plus"></i> Thêm vào thực đơn
            </a>
        </div>

        <div class="section">
            <h2 id="foodName" style="margin:0; color: #111;">Đang tải...</h2>
            <p id="foodDesc" style="color: #555; line-height: 1.7; margin-top: 15px;"></p>
        </div>

        <div class="section">
            <h3 class="section-title">Thành phần dinh dưỡng</h3>
            <div class="macro-grid">
                <div class="macro-box" style="background: #f0fdf4;">
                    <span id="valCalo" class="macro-value" style="color: #065f46;">0</span>
                    <span class="macro-label">Calo</span>
                </div>
                <div class="macro-box" style="background: #eff6ff;">
                    <span id="valProtein" class="macro-value" style="color: #1e40af;">0g</span>
                    <span class="macro-label">Protein</span>
                </div>
                <div class="macro-box" style="background: #fffbeb;">
                    <span id="valFat" class="macro-value" style="color: #92400e;">0g</span>
                    <span class="macro-label">Chất béo</span>
                </div>
                <div class="macro-box" style="background: #fef2f2;">
                    <span id="valCarb" class="macro-value" style="color: #991b1b;">0g</span>
                    <span class="macro-label">Carbs</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">
                <span>Nguyên liệu</span>
                <a id="linkCustomize" href="#" class="btn-small">
                </a>
            </div>
            <div id="ingredientGrid" class="ingredient-grid">
                <!-- JS render list ingredients -->
            </div>
        </div>

        <div class="section">
            <h3 class="section-title">Cách làm</h3>
            <p id="foodRecipe" style="white-space: pre-line; line-height: 1.8; color: #333;"></p>
        </div>
    </main>

    <div id="toast" class="favorite-toast" style="display: none;"></div>

    <script src="/assets/js/user/food_detail.js"></script>
</body>
</html>
