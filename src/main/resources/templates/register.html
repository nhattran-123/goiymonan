<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Healthy Food</title>
    
    <link rel="stylesheet" href="/assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/assets/css/register.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    
    <style>
        .select2-container--default .select2-selection--multiple { border: 1px solid #e2e8f0; border-radius: 8px; padding: 5px; min-height: 45px; }
        .select2-container--default.select2-container--focus .select2-selection--multiple { border-color: #10b981; }
        .error-border { border-color: #ef4444 !important; }
        .error-text { color: #ef4444; font-size: 12px; display: none; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="login-container" id="main-container" style="transition: all 0.3s; width: 400px; margin: 50px auto;">
        <form id="regForm">
            <!-- Vùng hiển thị lỗi tổng quát từ Server -->
            <div id="server-error" class="msg error-msg" style="display: none;"></div>

            <!-- BƯỚC 1: TÀI KHOẢN -->
            <div class="step-container active" id="step1">
                <div class="brand" style="justify-content: center; margin-bottom: 32px; display: flex; align-items: center; gap: 12px;">
                    <div class="brand-icon" style="background-color: #10b981; width: 45px; height: 45px; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px;">
                        <i class="fa-solid fa-leaf"></i>
                    </div>
                </div>
                <h1 class="login-title">Đăng ký tài khoản</h1>
                <p class="login-subtitle">Tạo tài khoản mới để bắt đầu hành trình</p>

                <div class="input-group">
                    <label>Họ và tên</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Nguyễn Văn A" required>
                </div>
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" name="email" placeholder="email@example.com" required>
                    <div id="emailError" class="error-text">Email đã tồn tại!</div>
                </div>
                <div class="input-group">
                    <label>Mật khẩu</label>
                    <input type="password" id="password" name="password" placeholder="............" required>
                </div>
                <div class="input-group">
                    <label>Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="............" required>
                    <div id="passError" class="error-text">Mật khẩu xác nhận không khớp!</div>
                </div>

                <button type="button" class="btn-login" onclick="validateAndNext(1)">Tiếp tục</button>
                <div class="register-link">Đã có tài khoản? <a href="/login">Đăng nhập</a></div>
            </div>

            <!-- BƯỚC 2: CHỈ SỐ CƠ THỂ -->
            <div class="step-container" id="step2" style="display: none;">
                <div class="progress-bar"><div class="progress-step active"></div><div class="progress-step active"></div><div class="progress-step"></div><div class="progress-step"></div></div>
                <h1 class="login-title text-left">Chỉ số cơ thể</h1>
                <p class="login-subtitle text-left">Cho chúng tôi biết về bạn nhé</p>

                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Giới tính</label>
                        <select id="gender" name="gender" class="form-control">
                            <option value="Nam">Nam</option>
                            <option value="Nữ">Nữ</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Độ tuổi</label>
                        <input type="number" id="age" name="age" placeholder="25">
                    </div>
                </div>
                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="input-group" style="flex: 1;">
                        <label>Chiều cao (cm)</label>
                        <input type="number" id="height" name="height" placeholder="170">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label>Cân nặng (kg)</label>
                        <input type="number" id="weight" name="weight" placeholder="65">
                    </div>
                </div>
                <div class="btn-footer" style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" class="btn-back" onclick="changeStep(2, 1)" style="flex: 1;">Quay lại</button>
                    <button type="button" class="btn-next-step" onclick="validateAndNext(2)" style="flex: 1; background: #10b981; color: white; border: none; border-radius: 8px;">Tiếp tục</button>
                </div>
            </div>

            <!-- BƯỚC 3: MỤC TIÊU -->
            <div class="step-container" id="step3" style="display: none;">
                <div class="progress-bar"><div class="progress-step active"></div><div class="progress-step active"></div><div class="progress-step active"></div><div class="progress-step"></div></div>
                <h1 class="login-title text-left">Mục tiêu sức khỏe</h1>
                <div class="input-group">
                    <label>Chiều cao mục tiêu (cm)</label>
                    <input type="number" id="targetHeight" name="desiredHeight" placeholder="175">
                </div>
                <div class="input-group">
                    <label>Cân nặng mục tiêu (kg)</label>
                    <input type="number" id="targetWeight" name="desiredWeight" placeholder="60">
                </div>
                 <div class="input-group">
                    <label>Mục tiêu</label>
                    <div class="radio-group goal-radio-group" style="display: flex; gap: 12px; margin-top: 10px;">
                       <input type="radio" id="goal1" name="goalType" value="Giảm cân">
                        <label class="goal-option" for="goal1"><span>Giảm cân</span></label>

                        <input type="radio" id="goal2" name="goalType" value="Duy trì" checked>
                        <label class="goal-option" for="goal2"><span>Duy trì</span></label>

                        <input type="radio" id="goal3" name="goalType" value="Tăng cân">
                        <label class="goal-option" for="goal3"><span>Tăng cân</span></label>
                    </div>
                </div>
                <div class="btn-footer" style="display: flex; gap: 10px; margin-top: 30px;">
                    <button type="button" class="btn-back" onclick="changeStep(3, 2)" style="flex: 1;">Quay lại</button>
                    <button type="button" class="btn-next-step" onclick="validateAndNext(3)" style="flex: 1; background: #10b981; color: white; border: none; border-radius: 8px;">Tiếp tục</button>
                </div>
            </div>

            <!-- BƯỚC 4: DỊ ỨNG & BỆNH LÝ -->
            <div class="step-container" id="step4" style="display: none;">
                <div class="progress-bar"><div class="progress-step active"></div><div class="progress-step active"></div><div class="progress-step active"></div><div class="progress-step active"></div></div>
                <h1 class="login-title text-left">Dị ứng và bệnh lý</h1>
                <p class="login-subtitle text-left">Giúp chúng tôi gợi ý món ăn an toàn hơn</p>

                <div class="input-group">
                    <label>Dị ứng thực phẩm</label>
                    <select id="allergy-select" name="allergyIds" class="form-control searchable-dropdown" multiple="multiple" style="width: 100%;"></select>
                </div>

                <div class="input-group" style="margin-top: 20px;">
                    <label>Bệnh lý đang mắc</label>
                    <select id="disease-select" name="diseaseIds" class="form-control searchable-dropdown" multiple="multiple" style="width: 100%;"></select>
                </div>
                
                <div class="btn-footer" style="display: flex; gap: 10px; margin-top: 30px;">
                    <button type="button" class="btn-back" onclick="changeStep(4, 3)" style="flex: 1;">Quay lại</button>
                    <button type="submit" id="btnSubmit" style="flex: 1; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer;">Hoàn tất</button>
                </div>
            </div>
        </form>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    <script src="/assets/js/register.js"></script>
</body>
</html>
